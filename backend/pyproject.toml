[project]
name = "nine-lives-backend"
version = "0.1.0"
description = "FastAPI backend for Nine Lives"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "python-multipart>=0.0.20",
    "opencv-python>=4.10",
    "httpx>=0.28",
    "Pillow>=11",
    "python-dotenv>=1.1",
    "pydantic-settings>=2.7",
    "supabase>=2.10",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "hypothesis>=6.100",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
